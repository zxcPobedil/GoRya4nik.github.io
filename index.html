<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>горячник спермоглот</title>

    <!-- Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        :root {
            --bg: #0f1722;
            --bg-2: #131c29;

            --card: rgba(19, 28, 41, 0.72);

            --blue: #4da3ff;
            --blue-hover: #77baff;

            --text: #e5edf8;
            --muted: #8ca3bf;

            --border: rgba(255,255,255,.08);

            --shadow:
                0 10px 30px rgba(0,0,0,.35);

            --radius: 24px;

            --transition: .25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;

            font-family: "Inter", sans-serif;
            color: var(--text);

            background:
                radial-gradient(circle at top left, #1d2d44 0%, transparent 35%),
                radial-gradient(circle at bottom right, #11253c 0%, transparent 35%),
                linear-gradient(135deg, #0b1119 0%, #121c29 100%);

            padding: 28px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 100%;
            max-width: 1500px;

            background: rgba(16, 23, 34, .75);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid var(--border);

            border-radius: 32px;

            padding: 28px;

            box-shadow: var(--shadow);

            animation: show .5s ease;
        }

        @keyframes show {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .grid {
            display: grid;
            grid-template-columns: 320px 320px 1fr;
            gap: 22px;
        }

        .panel {
            background: var(--card);

            border: 1px solid var(--border);

            border-radius: var(--radius);

            padding: 20px;
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;

            margin-bottom: 22px;

            font-size: 1.2rem;
            font-weight: 700;
        }

        .panel-title i {
            color: var(--blue);
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 14px;

            text-decoration: none;

            color: var(--text);

            background: rgba(255,255,255,.03);

            border: 1px solid rgba(255,255,255,.05);

            padding: 14px 16px;

            border-radius: 18px;

            transition: var(--transition);

            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);

            border-color: rgba(77,163,255,.4);

            background: rgba(77,163,255,.08);

            box-shadow: 0 10px 24px rgba(0,0,0,.25);
        }

        .icon {
            width: 46px;
            height: 46px;

            border-radius: 14px;

            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(255,255,255,.05);

            font-size: 1.2rem;

            flex-shrink: 0;

            transition: var(--transition);
        }

        .card:hover .icon {
            transform: scale(1.05);
            color: var(--blue-hover);
        }

        .card span {
            font-weight: 600;
            flex: 1;
        }

        .external {
            opacity: .45;
            font-size: .7rem;
        }

        /* blur card */

        .blur-card::after {
            content: "СКРЫТО";

            position: absolute;
            inset: 0;

            display: flex;
            align-items: center;
            justify-content: center;

            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);

            background: rgba(0,0,0,.55);

            color: white;

            font-size: 1rem;
            font-weight: 800;

            letter-spacing: 3px;

            text-shadow: 0 0 10px rgba(255,255,255,.4);

            transition: .35s ease;

            z-index: 5;
        }

        .blur-card:hover::after {
            opacity: 0;
        }

        /* center */

        .avatar-wrapper {
            display: flex;
            justify-content: center;

            margin-bottom: 20px;
        }

        .avatar {
            width: 100%;
            max-width: 280px;
            height: 130px;

            object-fit: cover;

            border-radius: 20px;

            border: 2px solid rgba(111, 118, 255, .2);

            transition: var(--transition);

            box-shadow:
                0 0 25px rgba(98, 90, 255, .2);
        }

        .avatar:hover {
            transform: scale(1.02);

            border-color: rgba(111,118,255,.6);

            box-shadow:
                0 0 35px rgba(111,118,255,.4);
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            border: none;

            cursor: pointer;

            font-family: inherit;
            font-size: .96rem;
            font-weight: 700;

            color: white;

            text-decoration: none;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            padding: 16px;

            border-radius: 18px;

            transition: var(--transition);

            background:
                linear-gradient(
                    135deg,
                    #23364f,
                    #172333
                );

            border: 1px solid rgba(255,255,255,.08);
        }

        .btn:hover {
            transform: translateY(-3px);

            background:
                linear-gradient(
                    135deg,
                    #2b4567,
                    #1f3046
                );
        }

        .btn:active {
            transform: scale(.98);
        }

        .steam {
            background:
                linear-gradient(
                    135deg,
                    #1b2838,
                    #171a21
                );
        }

        .telegram {
            background:
                linear-gradient(
                    135deg,
                    #278bcf,
                    #1f6ea5
                );
        }

        .nickname {
            text-align: center;

            margin-top: 6px;

            color: var(--muted);

            font-size: .8rem;
        }

        /* sites */

        .sites {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .future {
            opacity: .55;
            pointer-events: none;
            filter: grayscale(.2);
        }

        /* bottom */

        .bottom {
            margin-top: 26px;

            border-top: 1px solid rgba(255,255,255,.08);

            padding-top: 24px;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }

        /* toast */

        .toast {
            position: fixed;

            left: 50%;
            bottom: 25px;

            transform: translateX(-50%);

            background: rgba(17,24,39,.92);

            border: 1px solid rgba(77,163,255,.25);

            color: white;

            padding: 14px 20px;

            border-radius: 100px;

            font-size: .9rem;
            font-weight: 600;

            opacity: 0;

            pointer-events: none;

            transition: .2s ease;

            z-index: 999;
        }

        .toast.show {
            opacity: 1;
        }

        /* mobile */

        @media (max-width: 1100px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 650px) {

            body {
                padding: 14px;
            }

            .app {
                padding: 16px;
                border-radius: 24px;
            }

            .sites {
                grid-template-columns: 1fr;
            }

            .bottom-grid {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>
<body>

<div class="app">

    <div class="grid">

        <!-- socials -->

        <section class="panel">

            <div class="panel-title">
                <i class="fab fa-telegram"></i>
                <span>Соцсети</span>
            </div>

            <div class="list" id="socials"></div>

        </section>

        <!-- center -->

        <section class="panel">

            <div class="panel-title">
                <i class="fas fa-link"></i>
                <span>Мои ссылки</span>
            </div>

            <div class="avatar-wrapper">

                <img
                    class="avatar"
                    src="https://media.tenor.com/sDBNEe2njQ8AAAAM/optimus-prime-forest-battle.gif"
                    alt="avatar"
                >

            </div>

            <div class="buttons">

                <button class="btn" id="tradeBtn">
                    <i class="fas fa-exchange-alt"></i>
                    Трейд ссылка
                </button>

                <a
                    href="https://steamcommunity.com/profiles/76561199245492834"
                    target="_blank"
                    class="btn steam"
                >
                    <i class="fab fa-steam"></i>
                    Steam
                </a>


                <button class="btn telegram" id="tgBtn">
                    <i class="fab fa-telegram"></i>
                    Telegram
                </button>

            </div>

            <div class="nickname">
                @Gorya4nik
            </div>

        </section>

        <!-- sites -->

        <section class="panel">

            <div class="panel-title">
                <i class="fas fa-globe"></i>
                <span>Сайты</span>
            </div>

            <div class="sites" id="sites"></div>

        </section>

    </div>

    <!-- extras -->

    <section class="bottom">

        <div class="panel-title">
            <i class="fas fa-layer-group"></i>
            <span>Дополнительные сервисы</span>
        </div>

        <div class="bottom-grid" id="extras"></div>

    </section>

</div>

<div class="toast" id="toast"></div>

<script>

    // =========================
    // DATA
    // =========================

    const socials = [

        {
            name: "Telegram",
            icon: "fab fa-telegram-plane",
            url: "https://web.telegram.org"
        },

        {
            name: "VK",
            icon: "fab fa-vk",
            url: "https://vk.com"
        },

        {
            name: "Twitch",
            icon: "fab fa-twitch",
            url: "https://twitch.tv"
        },

        {
            name: "YouTube",
            icon: "fab fa-youtube",
            url: "https://youtube.com"
        }

    ];

    const sites = [

        {
            name: "Lisskins",
            icon: "fas fa-gem",
            url: "https://lis-skins.com/ru/"
        },

        {
            name: "Жабка",
            icon: "fas fa-frog",
            url: "https://jabka.gg/r/IdIoutqF26"
        },

        {
            name: "Case Battle",
            icon: "fas fa-bolt",
            url: "https://case-battle.red/"
        },

        {
            name: "SkinHouse",
            icon: "fas fa-home",
            url: "https://skinhouse.gg/"
        },

        {
            name: "Bulldrop",
            icon: "fas fa-dice",
            url: "https://bulldrop.uz/ru"
        },

        {
            name: "SkinBro",
            icon: "fas fa-handshake",
            url: "https://skinbro.ru/ru/"
        },

        {
            name: "Petuh Club",
            icon: "fas fa-crown",
            url: "https://petuh.cc/nambawan"
        },

        {
            name: "CS Fail",
            icon: "fas fa-skull",
            url: "https://10cs.fail/ru/"
        },

        {
            name: "DinoDrop",
            icon: "fas fa-dragon",
            url: "https://dinodrop.net/ru"
        },

        {
            name: "Скоро...",
            icon: "fas fa-clock",
            future: true
        }

    ];

    const extras = [

        {
            name: "Маркет КС",
            icon: "fas fa-chart-line",
            url: "https://market.csgo.com/ru/"
        },

        {
            name: "DeepSeek",
            icon: "fas fa-brain",
            url: "https://chat.deepseek.com/"
        },

        {
            name: "ChatGPT",
            icon: "fas fa-robot",
            url: "https://chatgpt.com/"
        },

        {
            name: "1Win",
            icon: "fas fa-trophy",
            url: "https://1win.online/",
            className: "blur-card"
        }

        

    ];

    // =========================
    // RENDER
    // =========================

    function createCard(item) {

        if (item.future) {

            return `
                <div class="card future">

                    <div class="icon">
                        <i class="${item.icon}"></i>
                    </div>

                    <span>${item.name}</span>

                    <i class="fas fa-hourglass-half external"></i>

                </div>
            `;
        }

        return `
            <a
                href="${item.url}"
                target="_blank"
                class="card ${item.className || ""}"
            >

                <div class="icon">
                    <i class="${item.icon}"></i>
                </div>

                <span>${item.name}</span>

                <i class="fas fa-arrow-up-right-from-square external"></i>

            </a>
        `;
    }

    document.getElementById("socials").innerHTML =
        socials.map(createCard).join("");

    document.getElementById("sites").innerHTML =
        sites.map(createCard).join("");

    document.getElementById("extras").innerHTML =
        extras.map(createCard).join("");

    // =========================
    // COPY
    // =========================

    
    const TRADE_LINK =
        "https://steamcommunity.com/tradeoffer/new?partner=1285227106";

    const TG_NICK =
        "@Gorya4nik";

    const toast =
        document.getElementById("toast");

    function showToast(text) {

        toast.textContent = text;

        toast.classList.add("show");

        clearTimeout(window.toastTimeout);

        window.toastTimeout = setTimeout(() => {

            toast.classList.remove("show");

        }, 1800);
    }

    async function copy(text, message) {

        try {

            await navigator.clipboard.writeText(text);

            showToast(message);

        } catch {

            const textarea =
                document.createElement("textarea");

            textarea.value = text;

            document.body.appendChild(textarea);

            textarea.select();

            document.execCommand("copy");

            textarea.remove();

            showToast(message);
        }
    }

    document
        .getElementById("tradeBtn")
        .addEventListener("click", () => {

            copy(
                TRADE_LINK,
                "✅ Трейд ссылка скопирована"
            );

        });

    document
        .getElementById("tgBtn")
        .addEventListener("click", () => {

            copy(
                TG_NICK,
                "📋 Telegram скопирован"
            );

        });

</script>

</body>
</html>
